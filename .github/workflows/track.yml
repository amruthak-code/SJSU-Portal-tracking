name: Track SJSU course seats

on:
  schedule:
    # Every 20 min, offset off the hour (GitHub cron is best-effort). cron-job.org
    # can also trigger this via the workflow_dispatch API for reliable timing.
    - cron: "8,28,48 * * * *"
  workflow_dispatch: {}

concurrency:
  group: track-seats
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Check seats + refresh catalog
        env:
          APP_URL: ${{ secrets.APP_URL }}           # deployed Vercel URL
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd scraper
          python check_seats.py
          python build_catalog.py CS
